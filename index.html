<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CV Webseite</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: rgba(245, 248, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 400px;

            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15),
                        0 0 15px rgba(59, 130, 246, 0.25);
        }

        .login-container h1 {
            margin-bottom: 20px;
            color: #1e293b;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
        }

        .login-container button {
            margin-top: 20px;
            width: 100%;
        }

        #error-message {
            color: red;
            margin-top: 15px;
            font-weight: bold;
        }

        .password-container {
            position: relative;
        }

        .show-password {
            position:absolute;
            right: 15px;
            top: 27px;
            cursor: pointer;
            font-size: 18px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <h1>Login</h1>
        <p>Bitte Passwort eingeben:</p>

        <div class="password-container">
            <input type="password" id="password" placeholder="Passwort">
            <span class="show-password" onclick="togglePassword()">👁️</span>
        </div>
        
        <button onclick="checkPassword()">Login</button>
        <p id="error-message"></p>
    </div>
    
    <script>

        function togglePassword() {

            let passwordInput =document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }

        function checkPassword() {

            let password = document.getElementById("password").value;
            if (password === "cv-harry-schleiss-2026-05-29") {
                window.location.href = "cv-harry-schleiss-2026-05-29.html";
            } else {
                document.getElementById("error-message").innerHTML = "Falsches Passwort!";
            }
        }
    </script>

</body>
</html>
